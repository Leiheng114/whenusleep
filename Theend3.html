<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 来自远方的信</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 10.5px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }
        .letter-text { color: #dddddd; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情内容 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        const formattedText = text.split('\n').filter(p => p.trim() !== '').join(`</p><p class="p ${cssClass}">`);
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${formattedText}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // 跳转逻辑
    function goTo(pageName) {
        window.location.href = pageName;
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 标题
        const title = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 致 明 星 警 探 先 生 ]
        </div>
        `;
        printText(title, 'highlight');

        // 信件内容
        const letter = `
        您好，明星警探先生，想必当您看到这封信时，您已经完全了解了案件的真相。

        信件可能有些长，但我，托尔斯特·博尔孔斯基，真挚的恳请您，看完这一封信。

        从哪里说起呢？就从在离开旅馆之后吧......在处理完旅馆的尸体后，我便带着那些财物离开了那座城市，回到了我的故乡。

        回去的生活很平静，和我前二十年度过的生活没什么两样。

        杀那两个旅馆老板倒是没什么，其实我都快忘光了。

        真正让我感到愧疚的，实际上是那个美国人，安德烈·奥古斯特。

        我并不后悔杀死玛利娅·赛尔纳斯和奥格伯德·凯维奇，我始终认为，他们是有罪的。

        他们虐杀了那两个无辜的恋人，他们本应有更好的未来，有个家庭，还有大把的时间享受人生。

        我实在无法忍受这种事情。

        试想一下，除了梅琳·安格斯特和帕特里克·安利纳斯以外，会不会还有第二个帕特里克·安利纳斯，第三个梅琳·安格斯特？

        他们承受的痛苦难道不应该由玛利娅·赛尔纳斯和奥格伯德·凯维奇来偿还吗？

        但我又何尝不是如此呢？

        我和他们两个一样的自私，为了我自以为是的正义而杀了他们，夺取了两条生命。

        甚至还杀了一个无辜的人。

        那个美国人也是一样的，他也可以有更好的未来......但我亲手把他的生命取走了。

        从始至终，我都只是个只注重自己想法的人渣而已。

        所以，为了缓解我内心的愧疚，我做了一个交易。

        我交出了我的左眼，以换取您“可以听到某些声音”的能力。

        我知道现在我不能赎罪。

        我交出的左眼也只是一种罪恶，或是虚伪。

        但我还是想让更多的人知道案件的真相。

        我感谢您，我在此真挚的感谢您查清了整件事情的真相，让更多人得知了真相。

        感谢。

        ——托尔斯特·博尔孔斯基
        `;
        printText(letter, 'letter-text');

        // 选项按钮（重来一次）
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goTo('index.html')">> 再来一次？</button>
            </div>
        `;
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
