<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 床头柜</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToRoom10() {
        window.location.href = 'room10.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 床 头 柜 ]
        </div>

        你拿起其中一张纸币，随后聆听了起来......

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “O rany, wzbogaciliśmy się!”
        <br><br>
        “Kannst du deinen Mund halten? Polen? Mein Bruder hält draußen Wache für mich, nicht damit du hier einfach nur rumstehst. Beweg dich ein bisschen schneller, okay?”
        <br><br>
        “Wiem, wiem, nie złość się, dobrze? To szybko minie. A tak przy okazji, w tamtej szafie jeszcze nie zaglądałem, powinieneś sprawdzić, czy nie ma tam czegoś.”
        <br><br>
        随后，是衣柜被打开的声音，而后，有什么东西从衣柜里掉了出来......
        <br><br>
        “Scheiße! Was zum Teufel ist hier los! Da drin ist eine Leiche!”
        <br><br>
        “O mój Boże... chwileczkę! Ale teraz nie możemy się tym przejmować, weźmy rzeczy z szafki nocnej i idźmy, dobra?”
        </span>
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToRoom10()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
