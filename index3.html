<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 大堂</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 12px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        /* 极简滚动条 */
        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p {
            margin-bottom: 20px;
        }

        .narrator {
            color: #aaaaaa; 
        }
        .highlight {
            color: #ffffff;
            font-weight: bold;
        }
        
        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 按钮之间的间距 */
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff; /* 像素阴影 */
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情内容 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        const formattedText = text.split('\n').filter(p => p.trim() !== '').join(`</p><p class="p ${cssClass}">`);
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${formattedText}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        你推开了那扇沉重的木门，踏入了赛尔纳斯旅馆的大堂。

        一股灰尘混合着老旧木头的气味扑面而来。
        头顶的复古吊灯闪烁着微弱的黄光，在地板上投下摇晃的阴影。

        你环顾四周，发现前台的木桌上放着一份【人员名单】。
        在名单的旁边，还散落着一把锈迹斑斑的钥匙。
        而在大堂的地面上，仿佛还有某样不起眼的物品被遗落在角落里。

        你知道，这栋三层楼的老建筑，藏着无数秘密。
        楼梯通向楼上，走廊尽头是厨房，而地下室的门虚掩着。
        `;
        printText(scene, 'highlight');

        // --- 生成选择分支 ---
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goTo('Erlou.html')">> 前往楼上</button>
                <button class="choice-btn" onclick="goTo('chufang.html')">> 前往一楼的厨房</button>
                <button class="choice-btn" onclick="goTo('index4.html')">> 前往一楼的房间</button>
                <button class="choice-btn" onclick="goTo('dixiashi.html')">> 前往地下室</button>
                <button class="choice-btn" onclick="goTo('People.html')">> 查看人员名单</button>
                <button class="choice-btn" onclick="goTo('Selnaes.html')">> 打开笔记本</button>
                <button class="choice-btn" onclick="goTo('danke2.html')">> 查看地上的弹壳</button>
            </div>
        `;
        
        // 将选项注入到页面底部
        storyTextEl.innerHTML += choicesHtml;
    };

    // --- 全局跳转函数 ---
    function goTo(pageName) {
        // 在跳转前打印一行字，增加交互反馈
        if(pageName === 'Selnaes.html') {
            // 如果是打开笔记本，打印一段氛围文字再跳转
            printText("你从口袋里掏出那本泛黄的笔记本，缓缓翻开...", 'highlight');
            setTimeout(() => {
                storyTextEl.scrollTop = 0;
                window.location.href = pageName;
            }, 1200); // 延迟 1.2 秒跳转
        } else {
            // 其他选项立即跳转
            storyTextEl.scrollTop = 0;
            window.location.href = pageName;
        }
    }
</script>
</body>
</html>
