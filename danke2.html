<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 弹壳</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToIndex3() {
        window.location.href = 'index3.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 弹 壳 ]
        </div>

        你拿起弹壳，仔细端详，随后开始聆听......

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “Sors ici ! Espèce de Russe ! Sors d’ici, et je peux te laisser mourir sans problème ! Sinon, si je te trouve, tu sauras ce qui se passe !”
        <br><br>
        “Ha ! Espèce de froussard, je sais pourquoi tu as peur !”
        <br><br>
        “Espèce de lâche ! Tu sais combien de cochons russes comme toi Napoléon Bonaparte a tués autrefois ? Sors vite et accepte ta mort !”
        <br><br>
        随后，那人继续寻找着什么......
        <br><br>
        而后......
        <br><br>
        “Иди к черту, ты скотина.”
        <br><br>
        只不过，虽然袭击者打伤了那人，但并没有让被击中的那人失去行动能力，或者直接丧命。
        <br><br>
        “Ugh ! Espèce de misérable ! Espèce de porc russe dégoûtant ! Comment oses-tu ! Comment oses-tu ! Je vais te tuer!”
        <br><br>
        随后，一声枪响响起。
        <br><br>
        “Мм...”
        <br><br>
        “Жаль, что ты попал только в моё левое плечо... У тебя больше нет пуль, правда?”
        <br><br>
        “Теперь ты можешь идти встречаться со своей Марией.”
        </span>
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToIndex3()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
