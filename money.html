<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 英镑</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToDixiashi() {
        window.location.href = 'dixiashi.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 英 镑 ]
        </div>

        你拿起了一张纸币，随后仔细聆听......

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “哥哥......？你还能听见我说话吗......？操......”（语言是德语，听起来像是男性）
        <br><br>
        随后，你听见了有人在小声的哭......
        <br><br>
        “不行！不行不行不行！我他妈得振作起来！我不能再这样娘们唧唧的哭哭啼啼了！我哥哥绝对不想看到我这个样子！”（语言是德语，听起来像是男性）
        <br><br>
        一阵翻找的声音传来......
        <br><br>
        “我现在想抽根烟......或者喝点酒......但我哥哥以前一直告诉我，我不应该染上那些东西......如果你还在就好了......”（语言是德语，听起来像是男性）
        <br><br>
        在一会后，翻找声停止，看起来，那人似乎已经准备好离开这里了......
        <br><br>
        “我要离开这里了......这一切都要结束了......我会离开这个旅馆，离开这座城市，我会洗心革面，我会开始我的新生活，我会和其他人一样，工作，组建家庭，有一个孩子，去公园散步，清理院子......”（语言是德语，听起来像是男性）
        <br><br>
        “我已经在期望了.”（语言是德语，听起来像是男性）
        <br><br>
        只不过，就在那人走上大堂后，有什么东西打中了他......
        <br><br>
        “你好啊......小男孩，你看看你都干了些什么？你把我的旅馆弄的一团糟！甚至......还让可爱，迷人，仁慈，温柔的玛利娅离我而去！你怎么敢！”（语言是法语，听起来像是男性）
        <br><br>
        随后，你听见了有人不断挣扎的声音......
        <br><br>
        “我......我快喘不过气了......哥哥，救......救救我......”（语言是德语，听起来像是男性）
        <br><br>
        最终，那人彻底没了动静。
        </span>
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToDixiashi()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
