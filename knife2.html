<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 厨刀</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 跳转逻辑 ---
    function goTo(pageName) {
        window.location.href = pageName;
    }

    // --- 返回房间逻辑 ---
    function goBackToRoom9() {
        window.location.href = 'room9.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 检查这把厨刀是否已经被收集过
        const hasKnife2 = localStorage.getItem('has_knife2') === 'true';

        // 场景描述
        let scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 厨 刀 ]
        </div>
        `;

        if (!hasKnife2) {
            // 首次发现
            scene += `
            你将那把厨刀捡了起来。

            它十分闪亮，尖锐，危险。

            这是丢失的厨刀之一。

            你收集到了第二把厨刀。
            `;
            // 记录到本地存储，表示已经获得
            localStorage.setItem('has_knife2', 'true');
        } else {
            // 已经收集过了
            scene += `
            你已经收起了这把厨刀。
            它和第一把刀一起，静静地躺在你的物品中。
            `;
        }

        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToRoom9()">> 去看看其他的</button>
                <button class="choice-btn" onclick="goTo('dao2.html')">> 你仔细聆听</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
