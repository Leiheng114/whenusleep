<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 房间 8</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 跳转逻辑 ---
    function goTo(pageName) {
        window.location.href = pageName;
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 房 间 8 ]
        </div>

        你推开了第二个房间的门。
        你进入了这个房间，但房间内出乎意料的凌乱。

        床上的床单和枕头都已经损坏。
        你仔细观察，看起来像是因为打斗而坏的。

        随后，你继续查看，书架倒在地上，以及床头柜也倒在了地上。

        而在墙壁上，插着一把斧头。
        `;
        printText(scene, 'highlight');

        // 生成选项
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goTo('index4.html')">> 离开房间</button>
                <button class="choice-btn" onclick="goTo('axe.html')">> 查看斧头</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
