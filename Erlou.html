<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 二楼走廊</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 12px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }
        .subtitle { color: #aaaaaa; font-size: 10px; margin-top: -10px; margin-bottom: 20px;}

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        /* --- 返回按钮 --- */
        .pixel-btn {
            background: #000; color: #ffffff; border: 2px solid #ffffff;
            padding: 10px 25px; font-family: inherit; font-size: 11px;
            cursor: pointer; box-shadow: 4px 4px 0px #ffffff;
            margin-top: 25px; display: block; margin-left: auto; margin-right: auto;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; }
        .pixel-btn:hover { background: #ffffff; color: #000000; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // 跳转至指定房间
    function goToRoom(roomNumber) {
        window.location.href = `room${roomNumber}.html`;
    }

    // 返回大堂
    function goBackToLobby() {
        window.location.href = 'index3.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 二 楼 走 廊 ]
        </div>
        
        你踏上了吱呀作响的木质楼梯。
        二楼的空气比大堂更加沉闷，灰尘在昏黄的灯光下缓缓浮动。

        走廊两侧排列着六扇紧闭的木门。
        但奇怪的是，门上都没有悬挂门牌号。
        它们长得一模一样，像是在刻意隐藏什么。

        <span class="subtitle">要从哪个先开始？</span>
        `;
        printText(scene, 'highlight');

        // 生成六个房间选项
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goToRoom(1)">> 第一个房间</button>
                <button class="choice-btn" onclick="goToRoom(2)">> 第二个房间</button>
                <button class="choice-btn" onclick="goToRoom(3)">> 第三个房间</button>
                <button class="choice-btn" onclick="goToRoom(4)">> 第四个房间</button>
                <button class="choice-btn" onclick="goToRoom(5)">> 第五个房间</button>
                <button class="choice-btn" onclick="goToRoom(6)">> 第六个房间</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;

        // 返回大堂的按钮 (放在最下面)
        storyTextEl.innerHTML += `<button class="pixel-btn" onclick="goBackToLobby()">回到大堂</button>`;
    };
</script>
</body>
</html>
