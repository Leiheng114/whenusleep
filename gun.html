<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 手枪</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToDixiashi() {
        window.location.href = 'dixiashi.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 左 轮 手 枪 ]
        </div>

        你拿起了手枪，随后检查了起来......里面并没有子弹，弹巢容量为五发。

        而后，你仔细聆听......

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “过来！给我他妈的滚过来，你们这三个家伙！”（语言为法语，听起来像是男性）
        <br><br>
        “他到底在说什么？这里没有人会法语吗？”（语言为德语，听起来像是男性）
        <br><br>
        “那个之前负责翻译的女佣被枪杀了！我之前在厨房看见了，但幸运的是，我学过一些法语......他让我们进去站着.”（语言为波兰语，听起来像是男性）
        <br><br>
        “噢......谢天谢地，至少我们这还有一个会法语的.”（语言为德语，听起来像是男性）
        <br><br>
        “你们在密谋什么？都给我闭嘴！”（语言为法语，听起来像是男性）
        <br><br>
        “嘿！先生！厨师先生！请您冷静，冷静，好吗？我们只是三个微不足道的小毛贼，只是想来偷点钱而已，没必要杀了我们三个.”（语言为法语，有些蹩脚，听起来像是男性）
        <br><br>
        “弟弟......如果那个该死的厨师和波兰佬说话的时候分心，我就冲上去，把他的枪夺过来，然后把他杀掉，如果我被击中了，那你就赶快往上跑，跑的越快越好，永远别回来找我，这就是计划，好吗？”（语言为德语，听起来像是男性，但很小声，只有两个人能听见）
        <br><br>
        “所以请听我说，厨师先生，您不需要杀我们，您想要什么？我们可以好好谈谈，不要激动，好吗？”（语言为法语，有些蹩脚，听起来像是男性）
        <br><br>
        只不过，正当那个人想继续对话时，随后，一个人突然冲出，只不过，随后枪响响起......
        <br><br>
        “他妈的！你们居然想趁我不注意偷袭我！你们这帮贱人！”（语言为法语，听起来像是男性）
         <br><br>
        “嘿！厨师先生！等等......我并不是......”（语言为法语，有些蹩脚，听起来像是男性）
        <br><br>
        只不过，他的话没说完，枪声便再一次响起......
        </span>
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToDixiashi()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
