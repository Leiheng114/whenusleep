<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 厨刀</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToDixiashi() {
        window.location.href = 'dixiashi.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 厨 刀 ]
        </div>

        你捡起了厨刀，看起来，这是丢失的其中一把。

        你仔细聆听......

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “去你妈的！去你妈的！我操你妈的！你他妈杀了我的哥哥！你以为我会这么容易的让你死掉吗！我操你妈的！”（语言为德语，听起来像是男性）
        <br><br>
        “呃......我可去你妈的吧......”（语言为法语，听起来像是男性）
        </span>

        随后，又是一连串不断的声音，他不断的将利器插入那人的身体，随后拔出，不断插入，不断拔出......

        直到那个人彻底没了气息......
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToDixiashi()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
