<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 肉干的记忆</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToCangku() {
        window.location.href = 'cangku.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 肉 干 的 记 忆 ]
        </div>

        你拿起肉干，仔细聆听......

        随后，先是一阵剁肉的声音。

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “这是帕特里克·安利纳斯先生，然后这是梅琳·安格斯特小姐......真是对甜蜜的恋人，吃起来会不会也要甜一些呢？”（语言为法语，听起来像女性）
        <br><br>
        “噢，我亲爱的玛利娅，您在处理食材的时候，仍旧表现的如此迷人......需要我帮忙吗？”（语言为法语，听起来像男性）
        <br><br>
        “不必了，亲爱的奥格伯德，这种食材来之不易，我想细细品味处理食材的每一个步骤.”（语言为法语，听起来像女性）
        <br><br>
        随后，那女声便哼起了歌来......而她似乎是想到什么似的，随后突然说道：
        <br><br>
        “对了！我亲爱的奥格伯德，您觉得，我们把这对恋人的头颅留下来怎么样？我们可以把他们的眼球挖下来，这样就有两个球洞了，然后把他们的左鼻孔或者右鼻孔也当做一个球洞，就像打保龄球一样！”（语言为法语，听起来像女性）
        <br><br>
        她很兴奋。
        <br><br>
        “噢！我亲爱的玛利娅，您为何如此富有想象力，但我觉得，我们还是得低调一些，不是吗？”（语言为法语，听起来像男性）
        <br><br>
        “您说的也不无道理.”（语言为法语，听起来像女性）
        </span>

        你得知了两个新的名字，'梅琳·安格斯特'和'帕特里克·安利纳斯'。
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToCangku()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
