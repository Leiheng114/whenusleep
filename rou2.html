<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔纳斯旅馆 - 肉干的记忆</title>
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 1-bit 全局暗黑框架 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            background-color: #000000;
            border: 4px solid #ffffff;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.2);
            height: 85vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            line-height: 1.8;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
        }

        #story-text::-webkit-scrollbar {
            width: 6px;
        }
        #story-text::-webkit-scrollbar-track {
            background: #000;
            border-left: 1px solid #fff;
        }
        #story-text::-webkit-scrollbar-thumb {
            background: #fff;
        }

        .p { margin-bottom: 15px; }
        .highlight { color: #ffffff; font-weight: bold; }

        /* --- 选项按钮容器 --- */
        #choices-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        /* --- 像素风格选项按钮 --- */
        .choice-btn {
            background: #000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #ffffff;
        }
        
        .choice-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        .choice-btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="story-text">
        <!-- 剧情与选项 -->
    </div>
</div>

<script>
    const storyTextEl = document.getElementById('story-text');

    // 打印文字函数
    function printText(text, cssClass = 'narrator') {
        storyTextEl.innerHTML += `<p class="p ${cssClass}">${text}</p>`;
        storyTextEl.scrollTop = storyTextEl.scrollHeight;
    }

    // --- 返回房间逻辑 ---
    function goBackToCangku() {
        window.location.href = 'cangku.html';
    }

    // --- 页面初始化 ---
    window.onload = function() {
        // 场景描述
        const scene = `
        <div style="text-align:center; font-size:14px; border-bottom:2px solid #fff; padding-bottom:15px; margin-bottom:20px;">
            [ 肉 干 的 记 忆 ]
        </div>

        你拿起肉干，仔细聆听......

        随后，先是一阵剁肉的声音。

        <span style="color:#fff; display:block; margin-top:15px; line-height:2.2;">
        “Ceci appartient à cette femme nommée... Merlin Angster, et ceci à cet homme nommé Patrick Anlinas... La chair de son/sa partenaire serait-elle plus « douce » à manger ?”
        <br><br>
        “Oh, ma chère Maria, tu es toujours si charmante même quand tu t'occupes d'eux... As-tu besoin d'un coup de main ?”
        <br><br>
        “Ce n'est pas nécessaire, mon cher Aldebard, ces expériences ne viennent pas facilement, je veux en profiter pleinement.”
        <br><br>
        随后，那女声便哼起了歌来......而她似乎是想到什么似的，随后突然说道：
        <br><br>
        “Au fait ! Cher Ogbird, que penses-tu de laisser les têtes de ces deux amants ici ? On peut leur crever les yeux puis leur épingler les orbites et une narine avec les doigts, comme au bowling !”
        <br><br>
        她很兴奋。
        <br><br>
        “Oh ! Ma chère Maria, pourquoi ton imagination est-elle si riche, c'est vraiment fascinant ! Mais je pense que nous devrions rester un peu plus discrets... n'est-ce pas ?”
        <br><br>
        “Oh ! C’est vrai !”
        </span>

        你得知了两个新的名字，'梅琳·安格斯特'和'帕特里克·安利纳斯'。
        `;
        printText(scene, 'highlight');

        // 生成选项：继续调查别的
        const choicesHtml = `
            <div id="choices-container">
                <button class="choice-btn" onclick="goBackToCangku()">> 去看看其他的</button>
            </div>
        `;
        
        storyTextEl.innerHTML += choicesHtml;
    };
</script>
</body>
</html>
